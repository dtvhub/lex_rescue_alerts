<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beacon | Rescue Map</title>

  <link rel="icon" type="image/png" href="favicon.png" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* FIXED: map now fills everything above footer */
    #map {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      bottom: 60px; /* footer height */
    }

    /* Taller footer */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      z-index: 9999;
    }

    /* Centered menu icon */
    #menu-icon {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 30px;
      cursor: pointer;
      opacity: 0.85;
    }

    #menu-icon:hover {
      opacity: 1;
    }

    /* Centered popup menu */
    #menu-popup {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      padding: 14px 18px;
      border-radius: 8px;
      color: white;
      display: none;
      z-index: 99999;
      animation: fadeIn 0.2s ease-in-out;
      font-size: 15px;
    }

    #menu-popup label {
      display: block;
      margin-bottom: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <footer>
    <img id="menu-icon" src="menu.png" alt="Menu" />
    powered by DTVHub | © 2026
  </footer>

  <div id="menu-popup">
    <label><input type="checkbox" id="fireToggle" checked> Fire</label>
    <label><input type="checkbox" id="emsToggle" checked> EMS</label>
    <label><input type="checkbox" id="cameraToggle" checked> Cameras</label>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <script src="map.js"></script>
  <script src="lexington.js"></script>

  <script>
    const menuIcon = document.getElementById("menu-icon");
    const menuPopup = document.getElementById("menu-popup");

    menuIcon.addEventListener("click", (e) => {
      e.stopPropagation();
      menuPopup.style.display =
        menuPopup.style.display === "block" ? "none" : "block";
    });

    document.addEventListener("click", (e) => {
      if (!menuPopup.contains(e.target) && e.target !== menuIcon) {
        menuPopup.style.display = "none";
      }
    });
  </script>

</body>
</html>
