<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/png"
        href="https://github.com/dtvhub/beacon/blob/main/map/assets/images/beaconLH4.PNG?raw=true">

  <!-- Leaflet CSS -->
  <link

    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <!-- YAML Parser -->

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden; /* Prevent scrolling */
    }

    header {
      background: #1C1C1C;
      padding: 18px 22px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #333;
      height: 60px;
      box-sizing: border-box;
    }

    header img {
      width: 60px;
      height: auto;
      opacity: 0.9;
    }

    /* FIXED FOOTER HEIGHT */
    footer {
      position: relative;
      background: rgba(28, 28, 28, 0.92);
      padding: 10px 10px;
      text-align: center;
      font-size: 12px;
      color: white;
      border-top: 1px solid #333;
      height: 48px;
      box-sizing: border-box;
    }

    /* MAP FITS SCREEN EXACTLY */
    #map {
      width: 100%;
      height: calc(100vh - 108px); /* 60px header + 48px footer */
    }

    /* MENU ICON — PERFECTLY CENTERED */
    .menu-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.2s ease;
      z-index: 1001;
    }

    .menu-icon:hover {
      opacity: 1;
    }

    /* POPUP MENU */
    .menu-popup {
      position: absolute;
      bottom: 58px; /* 48px footer + 10px spacing */
      left: 10px;
      background-color: rgba(28, 28, 28, 0.95);
      color: white;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid #333;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 1002;
      text-align: left;
      font-size: 14px;
    }

    .menu-popup.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .menu-popup label {
      display: block;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .menu-popup input[type="checkbox"] {
      margin-right: 6px;
    }
  </style>
</head>

<body>

  <header>
    <img src="https://github.com/dtvhub/beacon/blob/main/map/assets/images/beaconLH4.PNG?raw=true" alt="Beacon logo">
    Beacon | Rescue Map
  </header>

  <div id="map"></div>

  <footer>
    powered by DTVHub | © 2026

    <img id="menuButton"
         src="https://github.com/dtvhub/beacon/blob/main/map/assets/images/icons/menu%20.png?raw=true"
         alt="Menu"
         class="menu-icon">

    <div id="layerMenu" class="menu-popup">
      <label><input type="checkbox" id="fireLayerToggle" checked> Fire</label>
      <label><input type="checkbox" id="emsLayerToggle" checked> EMS</label>
      <label><input type="checkbox" id="cameraLayerToggle" checked> Cameras</label>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
