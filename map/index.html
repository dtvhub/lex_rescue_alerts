<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Lexington Rescue Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map {
      height: 100vh;
      width: 100vw;
    }
  </style>
</head>
  <script src="js/lexington.js"></script>
<script>
  async function updateMap() {
    const calls = await fetchLexingtonCalls();
    console.log("Lexington calls:", calls);
  }

  updateMap();
  setInterval(updateMap, 60000); // refresh every minute
</script>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Initialize map
    const map = L.map('map').setView([38.0464, -84.4970], 12);

    // Dark basemap (Carto Dark Matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; CartoDB'
    }).addTo(map);
  </script>
</body>
</html>
