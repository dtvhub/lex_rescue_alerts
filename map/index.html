<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beacon | Rescue Map</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png"
        href="https://github.com/dtvhub/beacon/blob/main/map/assets/images/beaconLH4.PNG?raw=true">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <!-- YAML Parser -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* GLASS HEADER */
    header {
      background: rgba(20, 20, 20, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 18px 22px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      height: 60px;
      box-sizing: border-box;
      z-index: 9999;
      position: relative;
    }

    header img {
      width: 60px;
      height: auto;
      opacity: 0.9;
    }

    /* GLASS FOOTER */
    footer {
      position: relative;
      background: rgba(20, 20, 20, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 10px;
      text-align: center;
      font-size: 12px;
      color: white;
      border-top: 1px solid rgba(255,255,255,0.08);
      height: 48px;
      box-sizing: border-box;
      z-index: 9999;
    }

    /* MAP FITS SCREEN EXACTLY */
    #map {
      width: 100%;
      height: calc(100vh - 108px); /* 60 header + 48 footer */
      z-index: 1;
    }

    /* MENU ICON — CENTERED */
    .menu-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.2s ease;
      z-index: 10000;
    }

    .menu-icon:hover {
      opacity: 1;
    }

    /* GLASS POPUP MENU */
    .menu-popup {
      position: absolute;
      bottom: 58px;
      left: 10px;
      background: rgba(20, 20, 20, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: white;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 100000;
      text-align: left;
      font-size: 14px;
    }

    .menu-popup.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* ICON LEGEND ITEMS */
    .menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .menu-item img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      opacity: 0.9;
    }

    .menu-item input[type="checkbox"] {
      margin-left: auto;
      transform: scale(1.2);
    }
  </style>
</head>

<body>

  <header>
    <img src="https://github.com/dtvhub/beacon/blob/main/map/assets/images/beaconLH4.PNG?raw=true" alt="Beacon logo">
    Beacon | Rescue Map
  </header>

  <div id="map"></div>

  <footer>
    powered by DTVHub | © 2026

    <img id="menuButton"
         src="https://github.com/dtvhub/beacon/blob/main/map/assets/images/icons/menu%20.png?raw=true"
         alt="Menu"
         class="menu-icon">

    <!-- UPDATED POPUP MENU WITH ICONS -->
    <div id="layerMenu" class="menu-popup">

      <label class="menu-item">
        <img src="https://github.com/dtvhub/beacon/blob/main/map/assets/images/icons/fire.png?raw=true">
        Fire
        <input type="checkbox" id="fireLayerToggle" checked>
      </label>

      <label class="menu-item">
        <img src="https://github.com/dtvhub/beacon/blob/main/map/assets/images/icons/ems.png?raw=true">
        EMS
        <input type="checkbox" id="emsLayerToggle" checked>
      </label>

      <label class="menu-item">
        <img src="https://github.com/dtvhub/beacon/blob/main/map/assets/images/icons/camera.png?raw=true">
        Cameras
        <input type="checkbox" id="cameraLayerToggle" checked>
      </label>

    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script>
    const v = Date.now();
    document.write(`<script src="./js/map.js?v=${v}"><\/script>`);
    document.write(`<script src="./js/lexington.js?v=${v}"><\/script>`);
    document.write(`<script src="./js/cameras.js?v=${v}"><\/script>`);
  </script>

  <script>
    const menuButton = document.getElementById('menuButton');
    const layerMenu = document.getElementById('layerMenu');

    menuButton.addEventListener('click', (e) => {
      e.stopPropagation();
      layerMenu.classList.toggle('show');
    });

    document.addEventListener('click', () => {
      layerMenu.classList.remove('show');
    });

    layerMenu.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    document.getElementById('fireLayerToggle').addEventListener('change', e => {
      if (typeof fireLayer !== 'undefined') {
        e.target.checked ? fireLayer.addTo(map) : map.removeLayer(fireLayer);
      }
    });

    document.getElementById('emsLayerToggle').addEventListener('change', e => {
      if (typeof emsLayer !== 'undefined') {
        e.target.checked ? emsLayer.addTo(map) : map.removeLayer(emsLayer);
      }
    });

    document.getElementById('cameraLayerToggle').addEventListener('change', e => {
      if (typeof cameras !== 'undefined') {
        e.target.checked ? cameras.addTo(map) : map.removeLayer(cameras);
      }
    });
  </script>

</body>
</html>
