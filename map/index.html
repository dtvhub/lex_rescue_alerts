<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lexington Rescue Map</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />

    <!-- YAML Parser (required for codes.yml) -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        header {
            background: #1C1C1C;
            padding: 15px 20px;
            font-size: 22px;
            font-weight: bold;
            color: white;
        }

        footer {
            background: #1C1C1C;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: white;
        }

        #map {
            width: 100%;
            height: calc(100vh - 120px);
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        Lexington Rescue Map
    </header>

    <!-- MAP -->
    <div id="map"></div>

    <!-- FOOTER -->
    <footer>
        powered by DTVHub
    </footer>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>

    <!-- Your scripts (order matters!) -->
    <script src="./js/map.js?v=20260329a"></script>
    <script src="./js/lexington.js?v=20260329a"></script>

</body>
</html>
