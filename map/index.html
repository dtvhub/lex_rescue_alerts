<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lexington Rescue Map</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />

    <!-- YAML Parser -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        /* HEADER */
        header {
            background: #1C1C1C;
            padding: 18px 22px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #333;
        }

        header img {
            width: 140px;
            height: auto;
            opacity: 0.9;
        }

        /* FOOTER */
        footer {
            background: rgba(28, 28, 28, 0.92);
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: white;
            border-top: 1px solid #333;
        }

        #map {
            width: 100%;
            height: calc(100vh - 120px);
        }
    </style>
</head>

<body>

    <!-- HEADER WITH BEACON LOGO -->
    <header>
        <img src="https://github.com/dtvhub/lex_rescue_alerts/blob/main/map/assets/images/beaconlogo2.png?raw=true" alt="Beacon logo">
        | Lexington Rescue Map
    </header>

    <!-- MAP -->
    <div id="map"></div>

    <!-- FOOTER -->
    <footer>
        powered by DTVHub | © 2026
    </footer>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>

    <!-- Auto Cache‑Buster for map.js + lexington.js -->
    <script>
        const v = Date.now(); // generates a unique version every load
        document.write(`<script src="./js/map.js?v=${v}"><\/script>`);
        document.write(`<script src="./js/lexington.js?v=${v}"><\/script>`);
    </script>

</body>
</html>
