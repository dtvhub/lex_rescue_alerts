<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beacon | Rescue Map</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png"
        href="https://github.com/dtvhub/beacon/blob/main/map/assets/images/beaconLH4.PNG?raw=true">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- YAML Parser -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    /* HEADER */
    header {
      background: #1C1C1C;
      padding: 18px 22px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #333;
    }

    header img {
      width: 60px;
      height: auto;
      opacity: 0.9;
    }

    /* FOOTER */
    footer {
      position: relative;
      background: rgba(28, 28, 28, 0.92);
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: white;
      border-top: 1px solid #333;
    }

    #map {
      width: 100%;
      height: calc(100vh - 120px);
    }

    /* MENU ICON */
    .menu-icon {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.2s ease;
      z-index: 1000;
    }

    .menu-icon:hover {
      opacity: 1;
    }

    /* POPUP MENU WITH FADE */
    .menu-popup {
      position: absolute;
      bottom: 55px;
      left: 10px;
      background-color: rgba(28, 28, 28, 0.95);
      color: white;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid #333;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 1001;
      text-align: left;
      font-size: 14px;
    }

    .menu-popup.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .menu-popup label {
      display: block;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .menu-popup input[type="checkbox"] {
      margin-right: 6px;
    }
  </style>
</head>

<body>

  <!-- HEADER WITH BEACON LOGO -->
  <header>
    <img src="https://github.com/dtvhub/beacon/blob/main/map/assets/images/beaconLH4.PNG?raw=true" alt="Beacon logo">
    Beacon | Rescue Map
  </header>

  <!-- MAP -->
  <div id="map"></div>

  <!-- FOOTER -->
  <footer>
    powered by DTVHub | © 2026

    <!-- MENU ICON -->
    <img id="menuButton" src="./assets/images/icons/menu.png" alt="Menu" class="menu-icon">

    <!-- POPUP MENU -->
    <div id="layerMenu" class="menu-popup">
      <label><input type="checkbox" id="fireLayerToggle" checked> Fire</label>
      <label><input type="checkbox" id="emsLayerToggle" checked> EMS</label>
      <label><input type="checkbox" id="cameraLayerToggle" checked> Cameras</label>
    </div>
  </footer>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Auto Cache‑Buster for map.js + lexington.js + cameras.js -->
  <script>
    const v = Date.now();
    document.write(`<script src="./js/map.js?v=${v}"><\/script>`);
    document.write(`<script src="./js/lexington.js?v=${v}"><\/script>`);
    document.write(`<script src="./js/cameras.js?v=${v}"><\/script>`);
  </script>

  <!-- MENU SCRIPT -->
  <script>
    const menuButton = document.getElementById('menuButton');
    const layerMenu = document.getElementById('layerMenu');

    // Toggle menu
    menuButton.addEventListener('click', (e) => {
      e.stopPropagation();
      layerMenu.classList.toggle('show');
    });

    // Close menu when clicking anywhere else
    document.addEventListener('click', () => {
      layerMenu.classList.remove('show');
    });

    // Prevent closing when clicking inside popup
    layerMenu.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    // Layer toggles
    document.getElementById('fireLayerToggle').addEventListener('change', e => {
      if (typeof fireLayer !== 'undefined') {
        e.target.checked ? fireLayer.addTo(map) : map.removeLayer(fireLayer);
      }
    });

    document.getElementById('emsLayerToggle').addEventListener('change', e => {
      if (typeof emsLayer !== 'undefined') {
        e.target.checked ? emsLayer.addTo(map) : map.removeLayer(emsLayer);
      }
    });

    document.getElementById('cameraLayerToggle').addEventListener('change', e => {
      if (typeof cameras !== 'undefined') {
        e.target.checked ? cameras.addTo(map) : map.removeLayer(cameras);
      }
    });
  </script>

</body>
</html>
